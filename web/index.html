<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Builder Board</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #f9f7f4; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    .grid-cell {
      width: 14px; height: 14px;
      border-radius: 3px;
      background: #e8e4dc;
      flex-shrink: 0;
    }
    .grid-cell[data-level="1"] { background: #c6e48b; }
    .grid-cell[data-level="2"] { background: #7bc96f; }
    .grid-cell[data-level="3"] { background: #239a3b; }
    .grid-cell[data-level="4"] { background: #196127; }
    .grid-cell[data-session="1"] { outline: 2px solid #f59e0b; outline-offset: 1px; }

    /* Smaller cells on mobile */
    @media (max-width: 639px) {
      .grid-cell { width: 11px; height: 11px; border-radius: 2px; }
    }

    .tag-shipped  { background: #dcfce7; color: #166534; }
    .tag-standup  { background: #dbeafe; color: #1e40af; }
    .tag-blocker  { background: #fff3cd; color: #92400e; }

    .avatar {
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 15px; flex-shrink: 0;
      object-fit: cover;
    }
    .section-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
      color: #9ca3af; padding: 0 0 12px 0;
    }
    .stat-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 999px;
      border: 1.5px solid #e5e7eb; background: white;
      font-size: 14px; font-weight: 500; color: #374151;
      white-space: nowrap;
    }
    .stat-pill.highlight {
      border-color: #f59e0b; background: #fffbeb; color: #92400e;
    }

    /* Stats grid: 2 cols on mobile, flow on desktop */
    #stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    @media (min-width: 640px) {
      #stats {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }
      .stat-pill { flex: none; }
    }

    /* Mobile stat pill: fill width, left-aligned */
    @media (max-width: 639px) {
      .stat-pill {
        padding: 10px 14px;
        font-size: 13px;
        border-radius: 14px;
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body class="min-h-screen p-4 sm:p-8">
  <div class="max-w-4xl mx-auto">

    <div class="flex items-center justify-between mb-6 sm:mb-8">
      <h1 class="text-xl sm:text-2xl font-bold text-gray-900 tracking-tight">Builder Board</h1>
      <span id="updated" class="text-xs text-gray-400"></span>
    </div>

    <div id="stats" class="mb-8 sm:mb-10"></div>
    <div id="board"></div>

    <div class="mt-6 flex flex-wrap items-center gap-3 text-xs text-gray-400">
      <span class="flex items-center gap-1">
        <span style="display:inline-block;width:10px;height:10px;border-radius:2px;outline:2px solid #f59e0b;outline-offset:1px;background:#e8e4dc"></span>
        session day
      </span>
      <span class="flex items-center gap-1.5">
        <span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#c6e48b"></span>
        1 commit
      </span>
      <span class="flex items-center gap-1.5">
        <span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#239a3b"></span>
        3–4 commits
      </span>
      <span class="flex items-center gap-1.5">
        <span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#196127"></span>
        5+ commits
      </span>
    </div>

  </div>

  <script>
    let sessionDates = new Set();

    const AVATAR_COLORS = [
      ["#e8d5c4","#7c4f2f"], ["#d4e8d4","#2f5c2f"], ["#d4d4e8","#2f2f7c"],
      ["#e8d4e8","#5c2f5c"], ["#e8e4d4","#5c4f2f"], ["#d4e4e8","#2f4f5c"],
    ];

    const isMobile = () => window.innerWidth < 640;

    function initials(name) {
      return name.split(" ").slice(0,2).map(w => w[0]).join("").toUpperCase();
    }

    function avatarColor(id) {
      const idx = parseInt(id.slice(-2), 16) % AVATAR_COLORS.length;
      return AVATAR_COLORS[idx];
    }

    function gridLevel(count) {
      if (count === 0) return 0;
      if (count === 1) return 1;
      if (count === 2) return 2;
      if (count <= 4) return 3;
      return 4;
    }

    function renderGrid(grid) {
      return grid.map(cell => {
        const level = gridLevel(cell.count);
        const isSession = sessionDates.has(cell.date) ? ' data-session="1"' : "";
        const label = cell.count > 0
          ? `${cell.count} commit${cell.count > 1 ? "s" : ""} on ${cell.date}`
          : isSession ? `Session day — ${cell.date}` : cell.date;
        return `<div class="grid-cell" data-level="${level}"${isSession} title="${label}"></div>`;
      }).join("");
    }

    function renderTags(tags) {
      return ["shipped","standup","blocker"].filter(t => tags[t]).map(t =>
        `<span class="tag-${t} text-xs font-semibold px-2 py-0.5 rounded-full">#${t} ×${tags[t]}</span>`
      ).join("");
    }

    function renderMember(m) {
      const [bg, fg] = avatarColor(m.discord_id);
      const avatar = m.avatar_url
        ? `<img src="${m.avatar_url}" class="avatar" />`
        : `<div class="avatar" style="background:${bg};color:${fg}">${initials(m.display_name)}</div>`;

      const streak = m.streak > 1
        ? `<span class="text-xs text-orange-500 font-semibold">🔥 ${m.streak}d</span>` : "";

      // Desktop layout: avatar | info | grid | commit count
      const desktop = `
        <div class="hidden sm:flex items-center gap-4 py-5 border-b border-gray-100 last:border-0">
          ${avatar}
          <div class="flex flex-col gap-1.5 min-w-[160px]">
            <div class="flex items-center gap-2">
              <span class="font-semibold text-gray-900 text-sm">${m.display_name}</span>${streak}
            </div>
            <span class="text-gray-400 text-xs">${m.project_name}</span>
            <div class="flex flex-wrap gap-1">${renderTags(m.tags)}</div>
          </div>
          <div class="flex gap-1 flex-wrap flex-1 ml-4">${renderGrid(m.grid)}</div>
          <div class="text-right min-w-[60px]">
            <div class="text-xl font-bold text-gray-900">${m.total_commits}</div>
            <div class="text-xs text-gray-400">commits</div>
          </div>
        </div>`;

      // Mobile layout: avatar + name + commits on top row, tags below, grid at bottom
      const mobile = `
        <div class="sm:hidden py-4 border-b border-gray-100 last:border-0">
          <div class="flex items-center gap-3 mb-2">
            ${avatar}
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2">
                <span class="font-semibold text-gray-900 text-sm truncate">${m.display_name}</span>
                ${streak}
              </div>
              <span class="text-gray-400 text-xs truncate block">${m.project_name}</span>
            </div>
            <div class="text-right flex-shrink-0">
              <div class="text-lg font-bold text-gray-900">${m.total_commits}</div>
              <div class="text-xs text-gray-400">commits</div>
            </div>
          </div>
          <div class="flex flex-wrap gap-1 mb-3">${renderTags(m.tags)}</div>
          <div class="flex gap-1 flex-wrap">${renderGrid(m.grid)}</div>
        </div>`;

      return desktop + mobile;
    }

    function renderSection(title, members) {
      if (!members.length) return "";
      return `
        <div class="mb-8">
          <div class="section-label">${title}</div>
          <div class="bg-white rounded-2xl border border-gray-100 shadow-sm px-4 sm:px-6">
            ${members.map(renderMember).join("")}
          </div>
        </div>`;
    }

    function renderStats(s) {
      const items = [
        { icon: "⚡", value: s.total_commits, label: "total commits" },
        { icon: "📦", value: s.total_shipped, label: "things shipped" },
        { icon: "📅", value: s.days_to_demo, label: "days to demo day", hl: s.days_to_demo <= 3 },
        { icon: "🔥", value: s.on_streaks, label: "on streaks" },
      ];
      if (s.days_to_next_session !== null) {
        const label = s.days_to_next_session === 0 ? "session today!" : "days to next session";
        items.splice(2, 0, {
          icon: "🎯",
          value: s.days_to_next_session === 0 ? "" : s.days_to_next_session,
          label,
          hl: s.days_to_next_session <= 1
        });
      }
      return items.map(i =>
        `<div class="stat-pill${i.hl ? " highlight" : ""}">
          <span>${i.icon}</span>
          ${i.value !== "" ? `<strong>${i.value}</strong>` : ""}
          <span>${i.label}</span>
        </div>`
      ).join("");
    }

    async function load() {
      try {
        const [sRes, mRes] = await Promise.all([fetch("/api/stats"), fetch("/api/members")]);
        const s = await sRes.json();
        const { builders, finding_footing } = await mRes.json();

        sessionDates = new Set(s.session_dates || []);

        document.getElementById("stats").innerHTML = renderStats(s);
        document.getElementById("board").innerHTML =
          renderSection("BUILDERS", builders) +
          renderSection("FINDING THEIR FOOTING", finding_footing);
        document.getElementById("updated").textContent =
          "Updated " + new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      } catch (e) {
        console.error("Failed to load board:", e);
      }
    }

    load();
    setInterval(load, 60_000);
  </script>
</body>
</html>
